# Dev/demo stack. Kafka runs KRaft single-broker; services are built from the
# repo root Dockerfile with different entrypoints.
name: prefixmesh

services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  directory-1: &directory
    build: ..
    command: ["/bin/directory", "--listen", ":7200", "--replica-id", "dir-1",
              "--peers", "directory-2:7200,directory-3:7200"]
  directory-2:
    <<: *directory
    command: ["/bin/directory", "--listen", ":7200", "--replica-id", "dir-2",
              "--peers", "directory-1:7200,directory-3:7200"]
  directory-3:
    <<: *directory
    command: ["/bin/directory", "--listen", ":7200", "--replica-id", "dir-3",
              "--peers", "directory-1:7200,directory-2:7200"]

  cachenode-1: &cachenode
    build: ..
    command: ["/bin/cachenode", "--listen", ":7100", "--node-id", "cn-1",
              "--advertise", "cachenode-1:7100", "--kafka", "kafka:9092",
              "--directory", "directory-1:7200,directory-2:7200,directory-3:7200"]
    depends_on: [directory-1, directory-2, directory-3, kafka]
  cachenode-2:
    <<: *cachenode
    command: ["/bin/cachenode", "--listen", ":7100", "--node-id", "cn-2",
              "--advertise", "cachenode-2:7100", "--kafka", "kafka:9092",
              "--directory", "directory-1:7200,directory-2:7200,directory-3:7200"]
  cachenode-3:
    <<: *cachenode
    command: ["/bin/cachenode", "--listen", ":7100", "--node-id", "cn-3",
              "--advertise", "cachenode-3:7100", "--kafka", "kafka:9092",
              "--directory", "directory-1:7200,directory-2:7200,directory-3:7200"]
  cachenode-4:
    <<: *cachenode
    command: ["/bin/cachenode", "--listen", ":7100", "--node-id", "cn-4",
              "--advertise", "cachenode-4:7100", "--kafka", "kafka:9092",
              "--directory", "directory-1:7200,directory-2:7200,directory-3:7200"]

  prefetcher:
    build: ..
    command: ["/bin/prefetcher", "--kafka", "kafka:9092",
              "--directory", "directory-1:7200,directory-2:7200,directory-3:7200"]
    depends_on: [kafka, directory-1, directory-2, directory-3]

  gateway:
    build: ..
    command: ["/bin/gateway", "--listen", ":7000", "--kafka", "kafka:9092",
              "--directory", "directory-1:7200,directory-2:7200,directory-3:7200"]
    ports:
      - "7000:7000"
    depends_on:
      - kafka
      - cachenode-1
      - cachenode-2
      - cachenode-3
      - cachenode-4
